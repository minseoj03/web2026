<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> HTML 기초 실습- 사용자 등록 신청서</title>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <form id="Myform1">
            <fieldset>
                <legend>기본 정보 (Essential)</legend>
                
                <label for="id">아이디: </label><br>
                <input type="text" id="id" name="id" maxlength="12" placeholder="4~12자 영문/숫자" pattern="[a-zA-Z0-9]{4,12}"><br><br>
                
                <label for="pw">비밀번호: </label><br>
                <input type="password" id="pw" name="pw"><br><br>

                <lable for="emal">이메일: </lable><br>
                <input type="text" id="emal" name="emal"><br><br>

            </fieldset>
        </form>
        <form id="Myform2">
            <fieldset>
                <legend>부가 정보 (Optional)</legend>

                <label for="phone">연락처: </label><br>
                <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"><br><br>

                <lable for="intr">관심분야: </lable><br><br>
                
                <input type="checkbox" id="intr1" name="intr1" value="HTML">
                <lable for="intr1">HTML5</lable>
                
                <input type="checkbox" id="intr2" name="intr2" value="CSS3">
                <lable for="intr2">CSS3</lable>
                
                <input type="checkbox" id="intr3" name="intr3" value="JavaScript">
                <lable for="intr3">JavaScript</lable><br><br>
                
                <label for="lv">숙련도:</label>
                <input type="range" id="lv" name="lv" min="0" max="100" step="2"><br/>
            </fieldset>
        </form>
        <br>
        <button type="submit" form="Myform1">가입 신청</button>
        <button type="reset" form="Myform1">초기화</button>
        
    </main>
    <footer>
        <p><a href="index.html">홈으로</a></p>
        <p> ©2026 Web Programming Course. All rights reserved. </p>
    </footer>
</body>
</html>
